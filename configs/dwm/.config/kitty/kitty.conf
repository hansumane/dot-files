# Font
font_family         Victor Mono Semibold
bold_font           Victor Mono Bold
italic_font         Victor Mono Italic Semibold
bold_italic_font    Victor Mono Italic Bold

font_size 14.0

adjust_line_height 0
adjust_column_width 0
adjust_baseline 0

# Background opacity
background_opacity 0.88

# Colors
# all colors are dark-bright
foreground  #d3dae3
background  #383c4a

# black
color0      #383c4a
color8      #3b4252

# red
color1      #bf616a
color9      #bf616a

# green
color2      #a3be8c
color10     #a3be8c

# yellow
color3      #ebcb8b
color11     #ebcb8b

# blue
color4      #81a1c1
color12     #81a1c1

# magenta
color5      #b48ead
color13     #b48ead

# cyan
color6      #88c0d0
color14     #88c0d0

# white
color7      #e5e9f0
color15     #e5e9f0

# Bell
enable_audio_bell no
