window:

  opacity: 0.9
  startup_mode: Maximized


font:

  normal:
    family: FiraCode Nerd Font
    style: Regular

  bold:
    family: FiraCode Nerd Font
    style: Medium

  italic:
    family: FiraCode Nerd Font
    style: Regular

  bold_italic:
    family: FiraCode Nerd Font
    style: Medium

  size: 24.0


colors:

  primary:
    background: '#383c4a'
    foreground: '#d3dae3'

  cursor:
    text: CellBackground
    cursor: CellForeground

  normal:
    black:   '#383c4a'
    red:     '#bf616a'
    green:   '#a3be8c'
    yellow:  '#ebcb8b'
    blue:    '#81a1c1'
    magenta: '#b48ead'
    cyan:    '#88c0d0'
    white:   '#e5e9f0'

  bright:
    black:   '#3b4252'
    red:     '#bf616a'
    green:   '#a3be8c'
    yellow:  '#ebcb8b'
    blue:    '#81a1c1'
    magenta: '#b48ead'
    cyan:    '#88c0d0'
    white:   '#e5e9f0'

  transparent_background_colors: false


live_config_reload: false
