# generated with `kitten choose-fonts`
font_family         family='FiraCode Nerd Font' style=Retina features='+calt +zero +ss09 cv31=1'
bold_font           family='FiraCode Nerd Font' style=Medium features='+calt +zero +ss09 cv31=1'
italic_font         family='FiraCode Nerd Font' style=Retina features='+calt +zero +ss09 cv31=1'
bold_italic_font    family='FiraCode Nerd Font' style=Medium features='+calt +zero +ss09 cv31=1'

font_size           14.0
adjust_line_height  6
disable_ligatures   never
