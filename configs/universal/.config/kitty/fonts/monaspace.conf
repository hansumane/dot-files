# generated with `kitten choose-fonts`
font_family         family='MonaspiceNe Nerd Font' style='Medium'          features='+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10'
italic_font         family='MonaspiceNe Nerd Font' style='Medium Italic'   features='+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10'
bold_font           family='MonaspiceNe Nerd Font' style='SemiBold'        features='+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10'
bold_italic_font    family='MonaspiceNe Nerd Font' style='SemiBold Italic' features='+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10'

font_size           13.0
adjust_line_height  5
disable_ligatures   never
