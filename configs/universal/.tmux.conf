## prefix
set -g prefix C-a
bind C-a send-prefix
unbind C-b

## config
setw -g mouse on
set -g base-index 1
set -g default-terminal "${TERM}"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

## plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @tilish-default 'tiled'
set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run -b '~/.tmux/plugins/tpm/tpm'

set -g @override_copy_command 'clipcopy'

## binds
#bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind e run-shell "tmux setw synchronize-panes \
                  $(tmux show-options -w | grep -q 'synchronize-panes on' \
                    && echo off || echo on)"
bind c clear-history
bind x kill-pane

set -g history-limit 131072

