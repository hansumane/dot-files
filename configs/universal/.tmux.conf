## prefix
set -g prefix C-a
bind C-a send-prefix
unbind C-b

## config
setw -g mouse on
set -g base-index 1
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

## plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @tilish-default 'tiled'
set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run -b '~/.tmux/plugins/tpm/tpm'

set -g @override_copy_command 'clipcopy'

## binds
#bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind e run-shell "tmux setw synchronize-panes \
                  $(tmux show-options -w | grep -q 'synchronize-panes on' \
                    && echo off || echo on)"
bind c clear-history
bind x kill-pane

set -g history-limit 131072

# tokyonight -> catppuccin-latte colorscheme

set -g mode-style "fg=#1e66f5,bg=#ccd0da"

set -g message-style "fg=#1e66f5,bg=#ccd0da"
set -g message-command-style "fg=#1e66f5,bg=#ccd0da"

set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#1e66f5,bg=#eff1f5"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g @status_norm "#[fg=#5c5f77,bg=#1e66f5]"
set -g @status_sync "#[fg=#5c5f77,bg=#d20f39]"
set -g @status_norm_after "#[fg=#1e66f5,bg=#eff1f5,nobold]"
set -g @status_sync_after "#[fg=#d20f39,bg=#eff1f5,nobold]"
set -g @status_rst "#[nounderscore,noitalics]"
set -g status-left "#{?pane_synchronized,\
#[bold]#{@status_sync} #S #{@status_sync_after}#{@status_norm}#{@status_rst},\
#[bold]#{@status_norm} #S #{@status_norm_after}#{@status_norm}#{@status_rst}}"

setw -g window-status-activity-style "underscore,fg=#acb0be,bg=#eff1f5"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#acb0be,bg=#eff1f5"
setw -g window-status-format "#[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]#[default] #I │ #W #[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#eff1f5,bg=#ccd0da,nobold,nounderscore,noitalics]#[fg=#1e66f5,bg=#ccd0da,bold] #I │ #W #[fg=#ccd0da,bg=#eff1f5,nobold,nounderscore,noitalics]"

set -g status-right "#[fg=#eff1f5,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#1e66f5,bg=#eff1f5] #{prefix_highlight} #[fg=#ccd0da,bg=#eff1f5,nobold,nounderscore,noitalics]#[fg=#1e66f5,bg=#ccd0da] %Y-%m-%d │ %H:%M #[fg=#1e66f5,bg=#ccd0da,nobold,nounderscore,noitalics]#[fg=#eff1f5,bg=#1e66f5,bold] #h "

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#df8e1d]#[bg=#eff1f5]#[fg=#eff1f5]#[bg=#df8e1d]"
set -g @prefix_highlight_output_suffix ""
